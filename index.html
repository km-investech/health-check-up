<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>건강검진 트래커 - 무료 OCR 버전</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet"/>

<style>
body{
  font-family:'Segoe UI',sans-serif;
  background:#f3f4f6;
  margin:0;
}
.card{
  background:white;
  border-radius:16px;
  padding:20px;
  box-shadow:0 2px 12px rgba(0,0,0,0.06);
}
.upload-zone{
  border:2px dashed #6366f1;
  border-radius:16px;
  padding:40px;
  text-align:center;
  background:white;
  cursor:pointer;
}
.metric{
  padding:12px;
  border-radius:12px;
  background:#f9fafb;
  border:1px solid #e5e7eb;
}
pre{
  white-space:pre-wrap;
  word-break:break-word;
  font-size:12px;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const {useState,useRef} = React;

const METRICS = [
  ["weight","체중","kg"],
  ["bmi","BMI",""],
  ["waist","허리둘레","cm"],
  ["sbp","수축기혈압","mmHg"],
  ["dbp","이완기혈압","mmHg"],
  ["glucose","혈당","mg/dL"],
  ["cholesterol","총콜레스테롤","mg/dL"],
  ["hdl","HDL","mg/dL"],
  ["ldl","LDL","mg/dL"],
  ["triglyceride","중성지방","mg/dL"],
  ["creatinine","크레아티닌","mg/dL"],
  ["gfr","GFR","mL/min"],
  ["ast","AST","IU/L"],
  ["alt","ALT","IU/L"],
  ["ggt","감마GTP","IU/L"],
];

async function preprocessImage(file){
  return new Promise((resolve)=>{
    const img = new Image();
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    img.onload = ()=>{
      const scale = 2;

      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
      const data = imageData.data;

      for(let i=0;i<data.length;i+=4){
        const gray =
          data[i] * 0.3 +
          data[i+1] * 0.59 +
          data[i+2] * 0.11;

        const v = gray > 170 ? 255 : 0;

        data[i] = v;
        data[i+1] = v;
        data[i+2] = v;
      }

      ctx.putImageData(imageData,0,0);
      canvas.toBlob(resolve,"image/png");
    };

    img.src = URL.createObjectURL(file);
  });
}

function extractNumber(text, regex){
  const m = text.match(regex);
  return m ? Number(m[m.length - 1]) : null;
}

function parseHealthText(text){

  const yearMatch = text.match(/20\d{2}/);

  const bpMatch = text.match(
    /혈압[^0-9]*([0-9]{2,3})\s*\/\s*([0-9]{2,3})/
  );

  return {
    year: yearMatch
      ? Number(yearMatch[0])
      : new Date().getFullYear(),

    weight: extractNumber(text,/체중[^0-9]*([0-9.]+)/),
    bmi: extractNumber(text,/BMI[^0-9]*([0-9.]+)/i),
    waist: extractNumber(text,/허리둘레[^0-9]*([0-9.]+)/),

    sbp: bpMatch ? Number(bpMatch[1]) : null,
    dbp: bpMatch ? Number(bpMatch[2]) : null,

    glucose: extractNumber(
      text,
      /(공복혈당|혈당)[^0-9]*([0-9.]+)/
    ),

    cholesterol: extractNumber(
      text,
      /총콜레스테롤[^0-9]*([0-9.]+)/
    ),

    hdl: extractNumber(text,/HDL[^0-9]*([0-9.]+)/i),
    ldl: extractNumber(text,/LDL[^0-9]*([0-9.]+)/i),

    triglyceride: extractNumber(
      text,
      /중성지방[^0-9]*([0-9.]+)/
    ),

    creatinine: extractNumber(
      text,
      /크레아티닌[^0-9]*([0-9.]+)/
    ),

    gfr: extractNumber(
      text,
      /(GFR|사구체여과율)[^0-9]*([0-9.]+)/
    ),

    ast: extractNumber(text,/AST[^0-9]*([0-9.]+)/),
    alt: extractNumber(text,/ALT[^0-9]*([0-9.]+)/),

    ggt: extractNumber(
      text,
      /(감마GTP|γ-GTP)[^0-9]*([0-9.]+)/
    ),

    rawText: text
  };
}

async function extractFromImage(file){

  const processed = await preprocessImage(file);

  const result = await Tesseract.recognize(
    processed,
    "kor+eng",
    {
      logger:(m)=>console.log(m)
    }
  );

  const text = result.data.text;

  const parsed = parseHealthText(text);

  parsed.confidence = result.data.confidence;

  return parsed;
}

function App(){

  const [data,setData] = useState(null);
  const [loading,setLoading] = useState(false);

  const inputRef = useRef(null);

  async function handleFile(file){

    try{
      setLoading(true);

      const parsed = await extractFromImage(file);

      setData(parsed);

    }catch(err){

      console.error(err);
      alert("OCR 분석 실패");

    }finally{

      setLoading(false);
    }
  }

  return (
    <div className="max-w-5xl mx-auto p-4">

      <div className="card mb-4">

        <h1 className="text-3xl font-bold text-indigo-600 mb-2">
          🏥 건강검진 트래커
        </h1>

        <p className="text-gray-500 mb-6">
          무료 OCR 기반 건강검진표 자동 분석
        </p>

        <div
          className="upload-zone"
          onClick={()=>inputRef.current.click()}
        >

          {
            loading
            ? <div className="text-xl">⏳ OCR 분석 중...</div>
            : <div>
                <div className="text-4xl mb-3">📄</div>
                <div className="font-semibold">
                  건강검진표 이미지를 업로드하세요
                </div>
              </div>
          }

        </div>

        <input
          ref={inputRef}
          type="file"
          accept="image/*"
          capture="environment"
          style={{display:"none"}}
          onChange={(e)=>{
            if(e.target.files[0]){
              handleFile(e.target.files[0]);
            }
          }}
        />

      </div>

      {
        data &&
        <div className="space-y-4">

          <div className="card">

            <div className="flex justify-between items-center mb-4">
              <h2 className="text-xl font-bold">
                📊 분석 결과
              </h2>

              <div className="text-sm text-gray-500">
                OCR 정확도:
                <b> {Math.round(data.confidence)}%</b>
              </div>
            </div>

            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">

              {
                METRICS.map(([key,label,unit])=>(

                  <div key={key} className="metric">

                    <div className="text-sm text-gray-500">
                      {label}
                    </div>

                    <div className="text-2xl font-bold text-indigo-600">
                      {data[key] ?? "—"}

                      <span className="text-sm text-gray-400 ml-1">
                        {unit}
                      </span>
                    </div>

                  </div>
                ))
              }

            </div>

          </div>

          <div className="card">

            <h2 className="text-xl font-bold mb-4">
              🔍 OCR 원문
            </h2>

            <pre>{data.rawText}</pre>

          </div>

        </div>
      }

    </div>
  );
}

ReactDOM.createRoot(
  document.getElementById("root")
).render(<App />);

</script>

</body>
</html>
